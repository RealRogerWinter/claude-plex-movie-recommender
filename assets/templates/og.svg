<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="The Recommendation Atlas — bespoke film &amp; TV recommendations for your Plex library">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0e15"/>
      <stop offset="1" stop-color="#08090d"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="32%" r="62%">
      <stop offset="0" stop-color="#e8b94a" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#9d7bd8" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#e8b94a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame"><rect width="1200" height="630"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow)"/>

    <!-- ambient stars -->
    <g fill="#ffffff" fill-opacity="0.45">
      <circle cx="120" cy="90" r="1.4"/><circle cx="300" cy="60" r="1"/><circle cx="520" cy="120" r="1.2"/>
      <circle cx="80" cy="300" r="1"/><circle cx="200" cy="470" r="1.3"/><circle cx="430" cy="540" r="1"/>
      <circle cx="650" cy="520" r="1.1"/><circle cx="1080" cy="540" r="1.2"/><circle cx="1140" cy="120" r="1"/>
      <circle cx="980" cy="80" r="1.3"/><circle cx="760" cy="70" r="1"/>
    </g>

    <!-- decorative constellation, right third -->
    <g stroke="#e8b94a" stroke-opacity="0.32" stroke-width="2" stroke-linecap="round">
      <line x1="930" y1="300" x2="1040" y2="190"/>
      <line x1="930" y1="300" x2="1070" y2="350"/>
      <line x1="930" y1="300" x2="850" y2="410"/>
      <line x1="930" y1="300" x2="845" y2="210"/>
      <line x1="1040" y1="190" x2="1070" y2="350"/>
      <line x1="850" y1="410" x2="1010" y2="455"/>
    </g>
    <g>
      <circle cx="1040" cy="190" r="11" fill="#e8b94a"/>
      <circle cx="1070" cy="350" r="8" fill="#9d7bd8"/>
      <circle cx="850" cy="410" r="8" fill="#e8b94a"/>
      <circle cx="845" cy="210" r="7" fill="#5ba6c7"/>
      <circle cx="1010" cy="455" r="6" fill="#e8b94a"/>
      <circle cx="930" cy="300" r="20" fill="none" stroke="#e8b94a" stroke-width="3"/>
      <circle cx="930" cy="300" r="6.5" fill="#e8b94a"/>
    </g>

    <!-- wordmark -->
    <g transform="translate(90,86)">
      <rect width="52" height="52" rx="12" fill="#0b0c11" stroke="#e8b94a" stroke-opacity="0.4"/>
      <circle cx="26" cy="26" r="12" fill="none" stroke="#e8b94a" stroke-width="2.4"/>
      <circle cx="26" cy="26" r="3.4" fill="#e8b94a"/>
    </g>
    <text x="156" y="122" font-family="ui-monospace, 'SFMono-Regular', 'Courier New', monospace" font-size="22" letter-spacing="6" fill="#e8b94a">THE RECOMMENDATION ATLAS</text>

    <text x="88" y="320" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="78" fill="#f4efe6">Your Plex library,</text>
    <text x="88" y="416" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="78" fill="#e8b94a" font-style="italic">extended.</text>

    <text x="92" y="486" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#aab0c2">Bespoke film &amp; TV picks, tied to what you own — mapped as a constellation.</text>
    <text x="92" y="556" font-family="ui-monospace, 'Courier New', monospace" font-size="18" letter-spacing="4" fill="#7c8196">SCAN &#183; RESEARCH &#183; MAP &#183; DISCOVER</text>

    <rect x="1.5" y="1.5" width="1197" height="627" rx="0" fill="none" stroke="#e8b94a" stroke-opacity="0.14" stroke-width="3"/>
  </g>
</svg>

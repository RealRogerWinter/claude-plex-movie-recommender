<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Recommendation Atlas logo">
  <rect width="64" height="64" rx="14" fill="#0b0c11"/>
  <!-- constellation edges -->
  <g stroke="#e8b94a" stroke-width="1.4" stroke-opacity="0.45" stroke-linecap="round">
    <line x1="32" y1="32" x2="44" y2="18"/>
    <line x1="32" y1="32" x2="47" y2="40"/>
    <line x1="32" y1="32" x2="20" y2="44"/>
    <line x1="32" y1="32" x2="19" y2="23"/>
    <line x1="44" y1="18" x2="47" y2="40"/>
  </g>
  <!-- library (smaller, accent) nodes -->
  <circle cx="44" cy="18" r="3" fill="#e8b94a"/>
  <circle cx="47" cy="40" r="2.6" fill="#9d7bd8"/>
  <circle cx="20" cy="44" r="2.6" fill="#e8b94a"/>
  <circle cx="19" cy="23" r="2.6" fill="#e8b94a"/>
  <!-- hub (the "you are here") -->
  <circle cx="32" cy="32" r="6.5" fill="none" stroke="#e8b94a" stroke-width="2"/>
  <circle cx="32" cy="32" r="2.3" fill="#e8b94a"/>
</svg>
